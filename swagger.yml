      operationId: "clearAllMockData"
      security:
        - APIkey: []
      responses:
        "200":
          description: "All mock data cleared successfully"
          schema:
            $ref: "#/definitions/Success"
        "500":
          description: "Server error"
          schema:
            $ref: "#/definitions/Error"

