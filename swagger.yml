              type: string
              format: uuid
              pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
              description: Tour UUID
            partnerID:
              type: string
              format: uuid
              pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
              description: Partner UUID 
            userID:
              type: string
              format: uuid
              pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
              description: User UUID (who made the booking)
            createdAt:
              type: integer
              format: int64
              minimum: 0
              description: Booking creation timestamp
            status:
              type: string
              enum: ["Booked","Completed","Cancelled","Under_review","Refund_processing","Accepted","Rejected"]
              description: Booking status
            paymentInfo:
              $ref: '#/definitions/BookingPaymentInfo'
            travellers:  
              type: array
              items:
               $ref: '#/definitions/Traveller'
        required:
           - id
           - tourID
           - partnerID
           - userID
           - createdAt
           - status
           - travellers
      total:
        type: integer
    
  UpcomingBookingresponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: Unique Booking ID
        example: "d0bcd44e-347e-4788-87e0-f6b9c7f18537"
      tourId:
        type: string
        description: UUID of the tour associated with this booking
      partnerId:
        type: string
        description: UUID of the partner who owns the tour
      numberOfSeats:
        type: integer
        format: int64
        description: Number of seats reserved
      cancelledAt:
        type: integer
        format: int64
        minimum: 0
        description: Timestamp when booking was cancelled (optional)
      partner:
        $ref: '#/definitions/PartnerResponse'
        description: The partner who owns this tour.
      status:
        type: string
        description: Current status of the booking
        example: "Booked"
      createdAt:
        type: integer
        format: int64
        minimum: 0
        description: Timestamp when booking was made
        example: 1765878065
      updatedAt:
        type: integer
        format: int64
        minimum: 0
        description: Timestamp of last update
        example: 1765878065
      tour:
        type: array
        description: Array containing tour details (typically one item)
        items:
          $ref: '#/definitions/BookingTourInfo'
      travellers:
        type: array
        description: List of travellers in this booking
        items:
          $ref: '#/definitions/Traveller'
      paymentInfo:
        type: array
        description: Payment details (typically one item)
        items:
          $ref: '#/definitions/BookingPaymentInfo'
      bookerName:
        type: string
        description: Name of the person who made the booking
        example: "Rahul singh" 
      createdBy:
        type: string
        description: Name of the creator
        example: "Rahul singh"
      createdById:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: UUID of the creator
        example: "755bc113-e5f0-4202-b997-dd7a7ee174c2"
      partnerActionAllowed:    
        type: boolean
        description: "If true, show Accept/Reject buttons. If false, hide them."
        example: true

  PastTrip:
    type: object
    properties:
      id:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: Unique Booking ID
        example: "d0bcd44e-347e-4788-87e0-f6b9c7f18537"
      status:
        type: string
        description: Current status of the booking
        example: "Booked"
      createdAt:
        type: integer
        format: int64
        minimum: 0
        description: Timestamp when booking was made
        example: 1765878065
      updatedAt:
        type: integer
        format: int64
        minimum: 0
        description: Timestamp of last update
        example: 1765878065
      tour:
        type: array
        description: Array containing tour details (typically one item)
        items:
          $ref: '#/definitions/BookingTourInfo'
      travellers:
        type: array
        description: List of travellers in this booking
        items:
          $ref: '#/definitions/Traveller'
      paymentInfo:
        type: array
        description: Payment details
        items:
          $ref: '#/definitions/BookingPaymentInfo'
      createdBy:
        type: string
        description: Name of the creator
        example: "Rahul singh"
      createdById:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: UUID of the creator
        example: "755bc113-e5f0-4202-b997-dd7a7ee174c2"

  BookingTourInfo:
    type: object
    properties:
      id:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        example: "a0811bbe-9013-4e86-8a13-2e2ab933ef4f"
      name:
        type: string
        example: "Luxury Beach Tour - Goa"
      state:
        type: string
        example: "Goa"
      reserveState:
        type: string
        description: State where the reserve is located
        example: "Rajasthan"
      reserveImageUrl:
        type: string
        format: uri
        description: Thumbnail or main image of the reserve
        example: "https://example.com/reserve.jpg"
      dateFrom:
        type: integer
        format: int64
        minimum: 0
        description: Start date as Unix timestamp
        example: 1768953600
      dateTo:
        type: integer
        format: int64
        minimum: 0
        description: End date as Unix timestamp
        example: 1769040000
      image:
        type: string
        format: uri
        example: "https://picsum.photos/800/600?random=265"
      duration:
        type: string
        example: "3D/2N"
      bookedSeats:
        type: integer
        description: Number of seats booked
        example: 10
      totalSeats:
        type: integer
        description: Total number of seats
        example: 20

  BookingPaymentInfo:
    type: object
    required:               
      - pricePerTraveller
      - bookingamount
      - discount
      - platformfee
      - totalamount
    properties:
      pricePerTraveller:      
        type: number
        format: double
        description: "The base price for a single traveller"
        example: 5000.00
      bookingamount:
        type: number
        format: double
        description: Base amount for the booking
        example: 21815.3685
      discount:                
        type: number
        format: double
        description: "Total discount applied to this booking"
        example: 500.00
      platformfee:
        type: number
        format: double
        description: Platform fee charged
        example: 100.00
      tax:
        type: array
        description: List of tax components
        items:
          $ref: '#/definitions/TaxDetail'
      totalamount:
        type: number
        format: double
        description: Final amount paid including tax and fees
        example: 25860.13483

  TaxDetail:
    type: object
    properties:
      gst:
        type: number
        example: 18%
      amount:
        type: number
        format: double
        example: 3944.76633

  BookingCancelResponse:
    type: object
    properties:
      message:
        type: string
        example: "Booking cancelled successfully."
      bookingID:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: The ID of the cancelled booking.
      status:
        type: string
        description: The updated status of the booking.
      cancelledAt:
        type: integer
        format: int64
        minimum: 0
        description: The timestamp when the booking was cancelled.
      updatedTravellers:
        type: array
        description: The list of remaining travellers (if any).
        items:
          $ref: '#/definitions/Traveller'
  
  travellers:
    type: object
    required:
      - name
      - age
      - isPrimary
      - gender
    properties:
      id:
        type: string
        description: Unique identifier for the traveller.
      name:
        type: string
        example: "Rahul singh"
      age:
        type: integer
        format: int64
        example: 25
      isPrimary:
        type: boolean
        example: true
      gender:
        type: string
        enum: ["Male", "Female", "Other"]
        example: "Male"
      phone:
        type: string
        example: "+919876543210"

  CreateTourRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - location
        - tourType
        - schedule
        - totalSeats
        - pricing
        - content
        - policies
        - infoAccurate
        # - autoApproveBookingRequests
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 140
          example: "Deluxe Beach Tour Kerala"
          
        location:
         $ref: '#/definitions/Address'

        tourType:
          type: string
          enum: [SHORT, MULTI_DAY]

        dayCount:
          type: integer
          minimum: 1
          description: Required when tourType=MULTI_DAY (can also be derived from dates server-side).

        languages:
          type: array
          items:
            type: string
          description: Languages for this tour (can default from partner profile if omitted).

        reserveId:
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: The UUID of the Reserve to which the tour belongs.

        schedule:
          $ref: "#/definitions/TourSchedule"
          description: Schedule depends on tourType.
        
        totalSeats:
          type: integer
          minimum: 1
          maximum: 9999
          description: Total number of seats for the tour.

        autoApproveBookingRequests: 
          type: boolean
          default: true
          description: Direct flag to auto-approve bookings without manual intervention.

        pickupDrop:
          $ref: "#/definitions/PickupDrop"
          description: Optional. If omitted, treated as available=false.

        pricing:
          $ref: "#/definitions/TourPricing"

        media:
          $ref: "#/definitions/TourMedia"

        content:
          $ref: "#/definitions/TourContent"

        policies:
          $ref: "#/definitions/TourPolicies"

        infoAccurate:
          type: boolean
          description: Mirrors the “I ensure the information provided is accurate” checkbox.

        stayDetails:
          $ref: "#/definitions/StayDetails"
          description: Optional. Usually for MULTI_DAY.

        itinerary:
          type: array
          items:
            $ref: "#/definitions/ItineraryDay"
          description: Optional. Usually for MULTI_DAY.

  TourSchedule:
    type: object
    properties: 
      multiDayTourSchedule:
        $ref: "#/definitions/MultiDayTourSchedule"
      shortTourSchedule:
        $ref: "#/definitions/ShortTourSchedule"

  ShortTourSchedule:
      type: object
      additionalProperties: false
      required: [dateTime, tourFrequency]
      properties:
        dateTime:
          type: integer
          format: int64
          minimum: 0
          description: Start date+time for SHORT tour (Unix timestamp).
        tourFrequency:
          type: string
          enum: [ONE_TIME, DAILY, WEEKLY]
        durationMinutes:
          type: integer
          minimum: 15
          description: Optional. If your product supports duration for SHORT tours.

  MultiDayTourSchedule:
      type: object
      additionalProperties: false
      required: [startDate, endDate, tourFrequency]
      properties:
        safariZones: 
          type: array
          items:
            type: string
          description: List of specific safari zones (e.g. "Dhikala", "Bijrani") for this schedule.
        startDate:
          type: integer
          format: int64
          minimum: 0
          description: Start date as Unix timestamp
        endDate:
          type: integer
          format: int64
          minimum: 0
          description: End date as Unix timestamp
        tourFrequency:
          type: string
          enum: [ONE_TIME]
        totalSafaris:
          type: integer
          minimum: 0
          description: Optional. Only if your UI/logic needs it.

  PickupDrop:
      type: object
      additionalProperties: false
      required: [available]
      properties:
        available:
          type: boolean
        startingLocation:
          type: string
        endLocation:
          type: string
        pickupLocations:
          type: array
          items:
            type: string
        dropLocations:
          type: array
          items:
            type: string

  TourPricing:
      type: object
      additionalProperties: false
      required: [currency, pricePerPerson]
      properties:
        currency:
          type: string
          example: "INR"
        pricePerPerson:
          type: number
          format: float
          minimum: 0
        originalPrice:
          type: number
          format: float
          minimum: 0
        discountedPrice:
          type: number
          format: float
          minimum: 0
        discountedPercentage:
          type: number
          format: float
          minimum: 0
          maximum: 100

  TourMedia:
      type: object
      additionalProperties: false
      properties:
        heroImage:
          type: string
          format: uri
        images:
          type: array
          items:
            type: string
            format: uri

  TourContent:
      type: object
      additionalProperties: false
      required: [description]
      properties:
        description:
          type: string
        highlights:
          type: array
          items:
            type: string
        inclusions:
          type: array
          items:
            $ref: "#/definitions/InclusionDetail"
        pointWiseTourInfo:
          type: array
          items:
            $ref: "#/definitions/TourPointWiseInfo"
        additionalDetails:
          type: string
        selectedInclusions:    
          type: array
          items:
            type: string
        selectedExclusions:   
          type: array
          items:
            type: string

  TourPolicies:
      type: object
      additionalProperties: false
      required: [cancellationPolicy]
      properties:
        bookingDeadline:
          type: integer
          format: int64
          minimum: 0
          description: Optional. Unix timestamp in seconds. If omitted, server can apply default rules.
        cancellationPolicy:
          type: string
          enum: [FLEXIBLE, MODERATE, STRICT]

  ForgotPasswordRequest:
    type: object
    required:
      - email
    properties:
      email:
        type: string
        format: email
        example: "user@example.com"

  ResetPasswordRequest:
    type: object
    required:
      - token
      - newPassword
    properties:
      token:
        type: string
        description: The reset token received via email
      newPassword:
        type: string
        format: password
        example: "NewSecurePassword123"