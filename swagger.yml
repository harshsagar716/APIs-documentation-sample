          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: The UUID of the Tour to remove from the wishlist. example- 7e1a2b3c-4d5e-6f70-8a9b-0c1d2e3f4a5b
      responses:
        200:
          description: Tour removed from wishlist successfully
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Invalid tour ID format
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Unauthorized - Authentication required
          schema:
            $ref: '#/definitions/Error'
        403:
          description: Forbidden - User cannot perform this action
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Tour not found in wishlist
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'
            
  '/v1/tours/states':
    get:
      tags: 
       - tours
      operationId: ListStateWiseTours
      summary: List tours grouped by states with minimal payload
      description: "Returns state-wise tour counts with minimal data for home screen performance"
      security:
        - APIkey: []
      parameters:
        - name: limit
          in: query
          type: integer
          default: 50
          maximum: 100
        - name: offset
          in: query
          type: integer
          default: 0
        - name: state
          in: query
          type: string
          description: Filter by specific state name
        - name: partnerName
          in: query
          type: string
          description: Filter by partner name
        - name: partnerId
          in: query
          type: string
          description: Filter by specific partner ID 
      responses:
        200:
          description: State-wise tour summary with minimal data
          schema:
            type: object
            properties:
              states:
                type: array
                items:
                  type: object
                  properties:
                    state:
                      type: string
                      example: "Kerala"
                    stateImageUrl:
                      type: string
                      example: "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?fm=jpg&fit=crop&w=1000&q=80"
                      description: Kerala is a state in the southwestern region of India...
                    tourCount:
                      type: integer
                      example: 15
                    stateDescription:
                      type: string
                    # Removed full tours array to reduce payload as requested
              total:
                type: integer
              limit:
                type: integer
              offset:
                type: integer
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/tours/featured':
    get:
      tags: 
        - tours
      operationId: ListFeaturedTours
      summary: List featured tours
      security:
        - APIkey: []
      parameters:
        - name: limit
          in: query
          type: integer
          default: 20
        - name: offset
          in: query
          type: integer
          default: 0
        - name: partnerName
          in: query
          type: string
          description: Filter by partner name
        - name: partnerId  
          in: query
          type: string
          description: Filter by partner ID
        
      responses:
        200:
          description: List of featured tours
          schema:
            type: object
            properties:
              tours:
                type: array
                items:
                  $ref: "#/definitions/TourResponse"
              total:
                type: integer
              limit:
                type: integer
              offset:
                type: integer
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/admin/tours/{tourId}/feature':
    put:
      tags: 
       - tours
      operationId: SetTourFeatureStatus
      summary: Update featured status of a tour
      security:
        - bearerToken: []
      parameters:
        - name: tourId
          in: path
          required: true
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the tour
