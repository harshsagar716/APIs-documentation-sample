swagger: "2.0"

info:
  description: "Wansafar API REST API Routes"
  version: "0.0.1"
  title: "Wansafar API"
  termsOfService: "http://swagger.io/terms/"
  contact:
    email: "shubham@orgosys.com"
  license:
    name: "Wansafar"
    url: "https://wansafar.com"
tags:
- name: "healthcheck"
  description: "healthcheck"
- name: "auth"
  description: "auth"
- name: "user"
  description: "user"
- name: "admin"
  description: "admin"
- name: "tours"
  description: "tours"
- name: "wishlist"
  description: "wishlist"
- name: "reserves"
  description: "reserves and parks"

schemes:
- "https"
- "http"

securityDefinitions:
  bearerToken:
    type: apiKey
    name: Authorization
    in: header
    description: |
      Use a Bearer token to authenticate requests. Format:
      Authorization: Bearer {token}
  APIkey:
    type: apiKey
    name: Authorization
    in: header
    description: API Key authentication. Pass the API key in the Authorization header.

paths:
  '/healthcheck':
    get:
      tags:
      - healthcheck
      operationId: Healthcheck
      summary: Healthcheck endpoints
      consumes:
      - application/json
      parameters: []
      produces:
      - application/json
      security:
        - APIkey: []
      responses:
        200:
          description: Successful request
          schema:
            $ref: "#/definitions/Success"
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/auth/google/login':
    get:
      tags:
      - auth
      operationId: GoogleLogin
      summary: Redirect to Google Sign-In URL
      produces:
      - application/json
      security:
        - APIkey: []
      responses:
        200:
          description: Accepted request for Google Sign-In URL
          headers:
            Location:
              type: string
              description: The URL to redirect to for Google Sign-In
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/auth/google/callback':
    get:
      tags:
      - auth
      operationId: GoogleCallback
      summary: Google OAuth2 callback to verify state and retrieve authorization code
      produces:
      - application/json
      security:
        - APIkey: []
      parameters:
        - name: state
          in: query
          required: true
          type: string
          description: The state parameter to prevent CSRF attacks
        - name: code
          in: query
          required: true
          type: string
          description: The authorization code received from Google
      responses:
        302:
          description: Redirect to specific URL after successful callback handling
          headers:
            Location:
              type: string
              description: The URL to redirect to after successful callback handling
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/oauth/google/token':
    get:
      tags:
      - auth
      operationId: SendGoogleToken
      summary: Retrieve Google Sign-In token
      produces:
      - application/json
      security:
        - APIkey: []
      parameters:
        - name: google_sign
          in: query
          required: true
          type: string
          description: The token received from Google Sign-In
      responses:
        200:
          description: Successful token retrieval
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        406:
          description: Not Acceptable
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/auth/forgot-password':
    post:
      tags:
      - auth
      operationId: ForgotPassword
      summary: Send a password reset email
      consumes:
      - application/json
      produces:
      - application/json
      security:
        - APIkey: []
      parameters:
        - name: payload
          in: body
          required: true
          schema:
            $ref: "#/definitions/ForgotPasswordRequest"
      responses:
        200:
          description: Reset email sent successfully
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        404:
          description: User not found
          schema:
            $ref: "#/definitions/Error"
        500:
          description: Internal Server Error
          schema:
            $ref: "#/definitions/Error"

  '/v1/auth/reset-password':
    post:
      tags:
      - auth
      operationId: ResetPassword
      summary: Reset password using a token
      consumes:
      - application/json
      produces:
      - application/json
      security:
        - APIkey: []
      parameters:
        - name: payload
          in: body
          required: true
          schema:
            $ref: "#/definitions/ResetPasswordRequest"
      responses:
        200:
          description: Password reset successfully
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Bad Request (Invalid or expired token)
          schema:
            $ref: "#/definitions/Error"
        500:
          description: Internal Server Error
          schema:
            $ref: "#/definitions/Error"

  '/v1/user':
    post:
      tags:
      - user
      operationId: CreateUser
      summary: Create a new user
      produces:
      - application/json
      security:
        - APIkey: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/UserRequest'
      responses:
        201:
          description: User created successfully
          schema:
            $ref: "#/definitions/UserResponse"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

    get:
      tags:
      - user
      operationId: GetUser
      summary: Retrieve user information
      produces:
      - application/json
      security:
        - bearerToken: []
      responses:
        200:
          description: Successful user retrieval
          schema:
            $ref: "#/definitions/UserResponse"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: User not found
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

    delete:
      tags:
      - user
      operationId: DeleteUser
      summary: Delete user information
      produces:
      - application/json
      security:
        - bearerToken: []
      responses:
        200:
          description: User Deleted Sucessfully
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: User not found
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/user/profile':
    patch:
      tags:
        - user
      operationId: PatchUserProfile
      summary: Partially update user profile (name, email, phone, preferences)
      description: |
        Partially update user profile fields. Only allowed fields (name, email, phone, preferences) can be updated. Optimistic locking and validation are applied. Returns only updated fields.
      consumes:
        - application/json
      produces:
        - application/json
      security:
        - bearerToken: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/UserProfilePatchRequest'
      responses:
        200:
          description: Profile updated successfully (returns only updated fields)
          schema:
            $ref: '#/definitions/UserProfilePatchResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        409:
          description: Conflict (optimistic locking failure)
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
            
  '/v1/partner':
    post:
      tags: 
       - partner
      operationId: CreatePartner
      summary: Create or Onboard a new partner
      security:
        - APIkey: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/PartnerOnboardingRequest'
      responses:
        201:
          description: Partner created successfully
          schema:
            $ref: "#/definitions/PartnerResponse"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        409:
          description: Partner already exists
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'    

    get:
      tags: 
       - partner
      operationId: ListPartner
      summary: List partner with optional filtering
      security:
        - APIkey: []
      parameters:
        - name: status
          in: query
          type: string
          enum: [pending, approved, rejected]
          description: Filter by verification status (optional)
        - name: limit
          in: query
          type: integer
          default: 20
          description: Number of items to return (optional, default 20)
        - name: offset
          in: query
          type: integer
          default: 0
          description: Number of items to skip (optional, default 0)
      responses:
        200:
          description: List of partner
          schema:
            type: object
            properties:
              partner:
                type: array
                items:
                  $ref: "#/definitions/PartnerResponse"
              total:
                type: integer
              limit:
                type: integer
              offset:
                type: integer
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/partner/top':
    get:
      tags:
        - partner
      operationId: GetTopPartner
      summary: "Get top partner based on rating and performance"
      description: "Returns top partner sorted by rating, review count, and performance metrics"
      security:
        - APIkey: []
      parameters:
        - name: limit
          in: query
          type: integer
          default: 10
          description: Number of top partner to return (default 10)
        - name: minRating
          in: query
          type: number
          format: float
          minimum: 0
          maximum: 5
          description: Minimum rating filter (optional)
      responses:
        200:
          description: Top partner list
          schema:
            type: object
            properties:
              partner:
                type: array
                items:
                  $ref: "#/definitions/PartnerResponse"
              total:
                type: integer
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/partner/{partnerId}':
    get:
      tags: 
       - partner
      operationId: GetPartner
      summary: Get partner by ID
      security:
        - APIkey: []
      parameters:
        - name: partnerId
          in: path
          required: true
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the partner
      responses:
        200:
          description: Partner details
          schema:
            $ref: "#/definitions/PartnerResponse"
        404:
          description: Partner not found
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

    put:
      tags: 
       - partner
      operationId: UpdatePartner
      summary: Update partner details (includes approval/rejection)
      security:
        - bearerToken: []
      parameters:
        - name: partnerId
          in: path
          required: true
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the partner
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/PartnerOnboardingRequest'
      responses:
        200:
          description: Partner updated successfully
          schema:
            $ref: "#/definitions/PartnerResponse"
        400:
          description: Bad Request
        404:
          description: Partner not found
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

    delete:
      tags: 
       - partner
      operationId: DeletePartner
      summary: Delete partner
      security:
        - bearerToken: []
      parameters:
        - name: partnerId
          in: path
          required: true
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the partner
      responses:
        200:
          description: Partner deleted successfully
          schema:
            $ref: "#/definitions/Success"
        404:
          description: Partner not found
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  /v1/partner/tours:
    post:
      tags: 
       - partner
      operationId: CreatePartnerTour
      summary: Create a new tour
      security:
        - bearerToken: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/CreateTourRequest'
      responses:
        201:
          description: Tour created successfully
          schema:
            $ref: "#/definitions/TourResponse"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        409:
          description: Tour with similar details already exists
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'
  
    get:
      tags:
        - partner
      summary: List or Get Partner Tours with Bookings
      description: Retrieve tours created by the partner. Can filter bookings within the tour by status.
      operationId: listOrGetPartnerTour
      security:
        - bearerToken: [] 
      parameters:
        - name: limit
          in: query
          type: integer
          default: 20
        - name: offset
          in: query
          type: integer
          default: 0
        - name: tourId
          in: query
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Optional UUID of a specific tour to fetch.
        - name: bookingId
          in: query
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Optional UUID to filter a specific booking within the tour.
        - name: bookingStatus
          in: query
          type: string
          enum: [upcoming, completed, cancelled, history]
          description: >
            Filter bookings inside the tour by status. 
            If left empty, returns all bookings for the tour.
      responses:
        200:
          description: Successful response
          schema:
            type: object
            properties:
              total:
                type: integer
              tours:
                type: array
                items:
                  allOf:
                    - $ref: '#/definitions/TourResponse'
                    - type: object
                      properties:
                        bookings:
                          type: array
                          description: List of bookings associated with this tour based on the filter.
                          items: 
                            type: object
                            properties:
                              booking_id:
                                type: string
                              user_name:
                                type: string
                              booking_status:
                                type: string
                              booked_at:
                                type: integer
                                format: int64
                              travellers:
                                type: array
                                items:
                                  $ref: '#/definitions/Traveller'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'

    patch:
      tags:
        - partner
      summary: Update a partner tour
      description: Update specific fields of a tour.
      operationId: updatePartnerTour
      consumes:
        - application/json
      produces:
        - application/json
      security:
        - bearerToken: []
      parameters:
        - name: tourId
          in: query
          description: The UUID of the tour to update.
          required: true
          type: string
        - in: body
          name: body
          description: Fields to update.
          required: true
          schema:
            $ref: '#/definitions/CreateTourRequest'
      responses:
        200:
          description: Tour updated successfully
          schema:
            $ref: '#/definitions/TourResponse'
        400:
          description: Invalid input
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        403:
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Tour not found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'

  /v1/partner/bookings:
    get:
      tags:
        - partner
      summary: List Partner Bookings
      description: Retrieve bookings created by the partner. Can filter bookings by status.
      operationId: listPartnerBookings
      security:
        - APIkey: []
        - bearerToken: []
      parameters:
        - name: limit
          in: query
          type: integer
          default: 20
        - name: offset
          in: query
          type: integer
          default: 0
        - name: tourId
          in: query
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Optional UUID of a specific tour to fetch.
        - name: bookingId
          in: query
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Optional UUID to filter a specific booking within the tour.
        - name: bookingStatus
          in: query
          type: string
          enum: [upcoming, completed, cancelled, history, new]
          description: >
            Filter bookings inside the tour by status. 
            - 'new': Returns bookings requiring action (Booked, Pending, Under_review).
            - 'upcoming': Returns confirmed future bookings.
            - 'history': Returns past bookings.
            If left empty, returns all bookings for the tour.
      responses:
        200:
          description: Successful response
          schema:
            $ref: '#/definitions/BookingResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'

  /v1/partner/bookings/status:
    patch:
      tags:
        - partner
      summary: Accept or Decline Bookings (Single or Bulk)
      description: |
        Update booking status. 
        **Usage:**
        - To update a single booking: Pass `bookingId` in query.
        - To bulk update ALL bookings for a tour: Pass `tourId` in query.
        - The new `status` is sent in the request body.
      operationId: updateBookingStatus
      consumes:
        - application/json
      produces:
        - application/json
      security:
        - bearerToken: []
      parameters:
        - name: bookingId
          in: query
          required: false
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the specific booking to update.
        - name: tourId
          in: query
          required: false
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: UUID of the Tour. If provided, updates ALL bookings for this tour.
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - status
            properties:
              status:
                type: string
                enum: [Accepted, Declined]
                description: The new status to apply to the target booking(s).
      responses:
        200:
          description: Booking status updated
          schema:
            $ref: '#/definitions/BookingStatusUpdateResponse'
        400:
          description: Invalid Request (e.g., missing status or missing target ID)
          schema:
            $ref: '#/definitions/Error'
        403:
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Booking or Tour not found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
            
  '/v1/admin/signin':
    post:
      tags:
        - admin
      operationId: AdminSignin
      summary: Admin Login
      description: |
        Public endpoint for the Owner/Super Admin to log in.
        Returns a Bearer token which must be used in the Authorization header for protected actions (like creating new admins).
      consumes:
        - application/json
      produces:
        - application/json
      security: [] 
      parameters:
        - in: body
          name: payload
          description: Admin credentials
          required: true
          schema:
            $ref: '#/definitions/AdminSigninRequest'
      responses:
        200:
          description: Login successful
          schema:
            $ref: '#/definitions/AdminSigninResponse'
        400:
          description: Invalid input
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Invalid credentials
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'

  '/v1/admin/register':
    post:
      tags:
        - admin
      operationId: CreateNewAdmin
      summary: Create a new Admin (Protected)
      description: |
        Creates a new admin account.
        **Strictly Protected:** This endpoint requires the Bearer token received from `/v1/admin/signin`.
      consumes:
        - application/json
      produces:
        - application/json
      security:
        - bearerToken: []
      parameters:
        - in: body
          name: payload
          description: Details for the NEW admin you want to create
          required: true
          schema:
            $ref: '#/definitions/AdminCreateRequest'
      responses:
        201:
          description: New Admin created successfully
          schema:
            $ref: '#/definitions/AdminResponse'
        400:
          description: Invalid input or Email already exists
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Unauthorized (Token missing/invalid)
          schema:
            $ref: '#/definitions/Error'
        403:
          description: Forbidden (Insufficient permissions)
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error
          schema:
            $ref: '#/definitions/Error'
  
  '/v1/admin/me':
    get:
      tags: 
       - admin
      operationId: GetCurrentAdmin
      summary: Get current authenticated admin's profile
      security:
        - bearerToken: []
      responses:
        200:
          description: Current admin details
          schema:
            $ref: '#/definitions/AdminResponse'
        401:
          description: Unauthorized
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

    put:
      tags: 
       - admin
      operationId: UpdateCurrentAdmin
      summary: Update current admin's profile (limited fields)
      security:
        - bearerToken: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/AdminSelfUpdateRequest'
      responses:
        200:
          description: Profile updated successfully
          schema:
            $ref: '#/definitions/AdminResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/admin/partners':
    post:
      tags: 
        - admin
      operationId: AdminCreatePartner
      summary: Admin - Create or Onboard a new partner
      description: Allows an admin to directly onboard a new partner from the admin dashboard.
      security:
        - bearerToken: []
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/PartnerOnboardingRequest'
      responses:
        201:
          description: Partner created successfully by admin
          schema:
            $ref: "#/definitions/PartnerAdminResponse"
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        401:
          description: Unauthorized - Invalid or missing admin token
          schema:
            $ref: '#/definitions/Error'
        409:
          description: Partner already exists
          schema:
