  '/v1/documents/upload':
    post:
      tags:
        - documents
      operationId: UploadDocument
      summary: Upload a document (image, PDF, or doc) and receive a URL
      description: >
        Allows uploading a document (image, PDF, or doc) and returns a URL for accessing the uploaded file.
      consumes:
        - multipart/form-data
      produces:
        - application/json
      security:
        - bearerToken: []
        - APIkey: []
      parameters:
        - in: formData
          name: file
          description: The document file to upload (image, PDF, or doc)
          required: true
          type: file
      responses:
        201:
          description: Uploaded successfully
          schema:
            $ref: "#/definitions/DocumentUploadResponse"
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        default:
          description: Unexpected error
          schema:
            $ref: "#/definitions/Error"

  '/v1/documents/{uuid}':
    get:
      tags:
        - documents
      operationId: GetDocument
      summary: Get a document by UUID
      description: >
        Retrieves a document for download or inline view by its UUID.
      produces:
        - application/octet-stream
        - application/json
      security:
        - APIkey: []
      parameters:
        - in: path
          name: uuid
          description: UUID of the document to retrieve
          required: true
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
      responses:
        200:
          description: The requested document file
          schema:
            
            $ref: '#/definitions/Success'
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Document not found
          schema:
            $ref: "#/definitions/Error"
        default:
          description: Unexpected error
          schema:
            $ref: "#/definitions/Error"

    delete:
      tags:
        - documents
      operationId: DeleteDocument
      summary: Delete a document by UUID
      description: Deletes a document using its UUID.
      produces:
        - application/json
      security:
        - APIkey: []
      parameters:
        - in: path
          name: uuid
          description: UUID of the document to delete
          required: true
          type: string
      responses:
        200:
          description: Document deleted successfully
          schema:
            $ref: "#/definitions/Success"
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Document not found
          schema:
            $ref: "#/definitions/Error"
        default:
          description: Unexpected error
          schema:
            $ref: "#/definitions/Error"

  '/v1/external/tripadvisor/search':
    get:
      tags:
        - external-integrations
      operationId: SearchTripAdvisorHotels
      summary: Search hotels on TripAdvisor by location
      description: |
        Search for hotels/accommodations on TripAdvisor.
        Returns basic info (name, image, city, state, rating) that can be used to populate StayDetails.
      security:
        - APIkey: []
      parameters:
        - name: searchQuery
          in: query
          required: true
          type: string
          description: "Search term (e.g., 'hotels in Goa', 'Taj Mahal Palace Mumbai')"
        - name: location
          in: query
          type: string
          description: "Filter by location (city or state)"
        - name: limit
          in: query
          type: integer
          default: 10
          maximum: 20
          description: "Maximum number of results to return"
      responses:
        200:
          description: List of hotels from TripAdvisor
          schema:
            $ref: '#/definitions/TripAdvisorSearchResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        401:
          description: TripAdvisor API authentication failed
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'

  '/v1/external/tripadvisor/location/{locationId}':
    get:
      tags:
        - external-integrations
      operationId: GetTripAdvisorHotelDetails
      summary: Get detailed hotel information from TripAdvisor
      description: |
        Fetch complete hotel details from TripAdvisor using location ID.
        Use this to auto-fill StayDetails when creating multi-day tours.
      security:
        - APIkey: []
      parameters:
        - name: locationId
          in: path
          required: true
          type: string
          description: "TripAdvisor location ID (obtained from search results)"
      responses:
        200:
          description: Detailed hotel information
          schema:
            $ref: '#/definitions/TripAdvisorHotelDetails'
        404:
          description: Hotel not found on TripAdvisor
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'

  '/v1/booking':
     get:
      tags:
        - bookings
      operationId: GetBookings
      summary: Retrieve bookings
      consumes:              
        - application/json   
      description: Get a list of user bookings.
      security:
        - bearerToken: [] 
      parameters:
        - name: bookingId        
          in: query
          required: false            
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Optional UUID to filter by specific booking
        - name: type
          in: query
          required: false
          type: string
          enum: [upcoming, completed, cancelled, history]
          default: upcoming
          description: Filter by booking type.
      responses:
        200:
          description: List of bookings
          schema:
            type: array         
            items:
              $ref: "#/definitions/UpcomingBookingresponse"
        404:
          description: No bookings found
        default:
          description: "Error"
          schema:
            $ref: "#/definitions/Error"

     post:
      tags:
        - bookings
      operationId: CreateBooking
      summary: Create a new booking
      security:
        - bearerToken: []
      parameters:
        - name: mode
          in: query
          type: string
          enum: [preview, book]
          default: book
          description: Pass 'preview' to get cost details without booking.
        - in: body
          name: bookingRequest 
          required: true
          schema:
            $ref: '#/definitions/TourBookingsRequest'
      responses:
        201: 
          description: Booking created
          schema:
            $ref: "#/definitions/TourBookingsResponse" 
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        404:
          description: Tour not found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

     delete:
      tags:
        - bookings
      operationId: CancelBooking
      summary: Cancel a booking or remove a specific traveller
      parameters:
        - name: bookingId
          in: query
          required: true
          type: string
        - name: travellerId
          in: query
          required: false
          type: string
      responses:
        200:
          description: Cancellation successful
          schema:
            $ref: "#/definitions/BookingCancelResponse"
        404:
          description: Booking not found
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'
   
    
definitions:
  DocumentUploadResponse:
    type: object
    properties:
      url:
        type: string
        format: uri
        description: URL to access the uploaded document
      fileName:
        type: string
        description: Name of the uploaded file
      contentType:
        type: string
        description: Content type of the uploaded file
    required:
      - url
      - fileName
      - contentType

  UserDocumentType:
    type: string
    description: "Categorizes the identity document uploaded by a normal user."
    enum:
      - AADHAR_CARD
      - PASSPORT
      - DRIVING_LICENSE
      - VOTER_ID
      - OTHER
    example: "AADHAR_CARD"

  UserDocument:
    type: object
    description: "An identity document attached to a user profile."
    required:
      - type
      - url
    properties:
      type:
        $ref: '#/definitions/UserDocumentType'
      url:
        type: string
        format: uri
        description: "The URL returned from the /documents/upload endpoint."
        example: "https://storage.googleapis.com/wansafar/uploads/aadhar.jpg"
      metadata:
        type: string
        description: "Optional details (e.g., 'Front View', 'Back Page')."
        example: "Front View"

  PartnerDocumentType:
    type: string
    description: "Categorizes the business/identity document uploaded by a partner."
    enum:
      - AADHAR_CARD
      - PAN_CARD
      - PASSPORT
      - DRIVING_LICENSE
      - VOTER_ID
      - GST_CERTIFICATE
      - CIN_NUMBER
      - BUSINESS_REGISTRATION_PROOF
      - BANK_ACCOUNT_PROOF
      - PROFILE_PHOTO
      - VISA_DOCUMENT
      - OTHER
    example: "GST_CERTIFICATE"

  PartnerDocument:
    type: object
    description: "A specific document attached to a partner profile or company details."
    required:
      - type
      - url
    properties:
      type:
        $ref: '#/definitions/PartnerDocumentType'
      url:
        type: string
        format: uri
        description: "The URL returned from the /documents/upload endpoint."
        example: "https://storage.googleapis.com/wansafar/uploads/gst_cert.pdf"
      metadata:
        type: string
        description: "Optional details (e.g., 'Page 1')."
        example: "Page 1"
  
  Success:
    type: object
    properties:
      code:
        type: integer
        format: int32
        description: HTTP status code for the response (e.g. 200, 201)
      message:
        type: string
    
  Error:
    type: object
    properties:
      code:
        type: integer
        format: int32
        description: HTTP status code for the error (e.g. 400, 401, 404, 500)
      message:
        type: string
    required:
      - code
      - message
    
  Status:
    properties:
      message:
        type: string

  UserRequest:
    type: object
    properties:
      email:
        type: string
        format: email
      mobileNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      dateOfBirth:
        type: integer
        format: int64
        minimum: 0
      profileImage:
        type: string
        description: Optional
      documents:
        type: array
        description: "List of uploaded user documents"
        items:
          $ref: '#/definitions/UserDocument'
    required:
      - email
      - dateOfBirth
      - firstName
      - lastName
      - mobileNumber

  UserResponse:
    type: object
    required:
      - id
      - firstName
      - lastName
      - email
      - mobileNumber
      - role
      - status
      - createdAt
      - dateOfBirth
      - isRegistered
    properties:
      id:
        type: string
        format: uuid
        pattern: '^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
        description: The UUID of the user.
        example: 1a2b3c4d-5e6f-7081-9a0b-1c2d3e4f5a6b
      firstName:
        type: string
      lastName:
        type: string
      email:
        type: string
        format: email
      mobileNumber:
        type: string
        description: User's mobileNumber
      role:
        type: array
        items:
          $ref: '#/definitions/role'
      status:
        type: boolean
      createdAt:
        type: integer
        format: int64
        minimum: 0
      updatedAt:
        type: integer
        format: int64
        minimum: 0
      isRegistered:
        type: boolean
        default: false
        description: Optional flag for new users
