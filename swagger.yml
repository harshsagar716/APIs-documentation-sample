          description: Tour not found
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/personalised-list':
    get:
      tags: [tours]
      operationId: GetPersonalisedTourList
      summary: Get a personalised list of tours for the user (MVP- sequential cycling, will upgrade to recommendations)
      description: |
        Returns a paginated, filtered list of tours tailored to the user. Initially, this endpoint cycles through available tours in a fair rotation (MVP), but is designed to support future personalized recommendations based on user activity and preferences. The API contract will remain stable as the backend logic evolves.
        
        - For anonymous/new users: returns a rotating list of tours (no personalization).
        - For logged-in users: will eventually use behavioral data for recommendations.
        - Supports basic filters for location and budget.
        - Pagination is supported via limit/offset.
        - Response format is stable and ready for future upgrades.
      security:
        - APIkey: []
      parameters:
        - name: limit
          in: query
          type: integer
          default: 20
          description: Number of tours to return (default 20)
        - name: offset
          in: query
          type: integer
          default: 0
          description: Number of tours to skip (for pagination)
        - name: location
          in: query
          type: string
          required: false
          description: Filter tours by location (optional)
        - name: minPrice
          in: query
          type: number
          format: double
          required: false
          description: Minimum price filter (optional)
        - name: maxPrice
          in: query
          type: number
          format: double
          required: false
          description: Maximum price filter (optional)
        - name: partnerName
          in: query
          type: string
          required: false
          description: Filter tours by partner name (optional)
        - name: partnerId
          in: query
          type: string
          required: false
          description: Filter tours by partner ID (optional)
      responses:
        200:
          description: List of tours personalised for the user (MVP- sequential cycling)
          schema:
            $ref: '#/definitions/PersonalisedTourListResponse'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/tours/popular':
    get:
      tags: 
       - tours
      operationId: ListPopularTours
      summary: List popular tours based on user activity
      security:
        - APIkey: []
      parameters:
        - name: timeframe
          in: query
          type: string
          enum: [day, week, month]
          default: week
          description: Timeframe to consider for popularity calculation
        - name: limit
          in: query
          type: integer
          default: 20
        - name: offset
          in: query
          type: integer
          default: 0
        - name: partnerName
          in: query 
          type: string
          description: Filter by partner name
        - name: partnerId
          in: query 
          type: string
          description: Filter by partner ID
      responses:
        200:
          description: List of popular tours
          schema:
            $ref: '#/definitions/PopularTourListResponse'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/v1/tours/best-deals':
    get:
      tags: 
       - tours
      operationId: ListBestDealTours
      summary: Get tours with best deals and discounts
      description: "Returns tours sorted by discount percentage or amount. Includes original and discounted prices."
      security:
        - APIkey: []
      parameters:
        - name: sortBy
          in: query
          type: string
          enum: [discountPercentage, discountAmount, price]
          default: discountPercentage
          description: Sort criteria for best deals
        - name: order
          in: query
          type: string
          enum: [asc, desc]
          default: desc
          description: Sort order (desc for highest discount first)
        - name: minDiscount
          in: query
          type: integer
          minimum: 0
          maximum: 100
          description: Minimum discount percentage (0-100)
        - name: limit
          in: query
          type: integer
          default: 20
          maximum: 50
        - name: offset
          in: query
          type: integer
          default: 0
        - name: partnerName
          in: query
          type: string
          description: Filter by partner name
        - name: partnerId
          in: query
          type: string
          format: uuid
          pattern: '^\{?[0-9a-f]{8,12}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$'
          description: Filter by partner ID
      responses:
        200:
          description: List of  est deal tours with discount information
          schema:
            type: object
            properties:
              tours:
                type: array
                items:
                  $ref: "#/definitions/TourResponse"
              total:
                type: integer
              limit:
                type: integer
              offset:
                type: integer
        400:
          description: Invalid parameters
          schema:
            $ref: '#/definitions/Error'
        default:
          description: "Error"
          schema:
            $ref: '#/definitions/Error'

  '/mocker/data':
    post:
      tags:
        - "mocker"
      summary: "Generates mock data for testing purposes"
      description: "Generates and populates the database with a specified number of mock users, tours, partners, etc."
      operationId: "generateMockData"
      consumes:
        - "application/json"
